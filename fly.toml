app            = 'cyclorer-osm'
primary_region = 'ams'

[build]

[env]
  NODE_ENV = 'production'
  CACHE_DIR = '/app/cache'
  # Set this to your frontend origin, or keep '*' if you truly want public access
  CORS_ORIGIN = 'https://misolabs.github.io'

[http_service]
  internal_port        = 3000
  force_https          = true
  auto_stop_machines   = 'stop'
  auto_start_machines  = true
  min_machines_running = 0

[[vm]]
  memory   = '256mb'
  cpu_kind = 'shared'
  cpus     = 1

[[mounts]]
  source      = 'cache_vol'
  destination = '/app/cache'


